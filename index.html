<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>🏀 NBA Player Wiki Search</title>
<style>
  :root {
    --bg: #0d1117;
    --panel: #161b22;
    --panel-2: #1c2129;
    --border: #30363d;
    --text: #e6edf3;
    --muted: #8b949e;
    --accent: #f97316;
    --accent-soft: rgba(249, 115, 22, 0.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: radial-gradient(1200px 600px at 50% -100px, #1b2735 0%, var(--bg) 60%);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px 80px;
  }
  header { text-align: center; margin-bottom: 28px; }
  header h1 { font-size: 2.2rem; letter-spacing: -0.5px; }
  header h1 .ball { display: inline-block; animation: bounce 1.6s ease-in-out infinite; }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  header p { color: var(--muted); margin-top: 8px; }

  .search-wrap { position: relative; width: 100%; max-width: 560px; }
  #search {
    width: 100%;
    padding: 14px 18px 14px 46px;
    font-size: 1.05rem;
    color: var(--text);
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #search:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .search-icon {
    position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
    color: var(--muted); pointer-events: none;
  }
  #suggestions {
    position: absolute; top: calc(100% + 6px); left: 0; right: 0;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    z-index: 10;
    display: none;
    box-shadow: 0 12px 32px rgba(0,0,0,0.5);
  }
  #suggestions.open { display: block; }
  .suggestion {
    padding: 12px 16px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 2px;
    border-bottom: 1px solid var(--border);
  }
  .suggestion:last-child { border-bottom: none; }
  .suggestion:hover, .suggestion.active { background: var(--accent-soft); }
  .suggestion .s-title { font-weight: 600; }
  .suggestion .s-desc { font-size: 0.82rem; color: var(--muted); }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 18px; max-width: 640px; }
  .chip {
    padding: 7px 14px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--muted);
    font-size: 0.88rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .chip:hover { color: var(--accent); border-color: var(--accent); transform: translateY(-1px); }
  .chip.random { color: var(--accent); border-color: var(--accent); }

  #card {
    margin-top: 32px;
    width: 100%;
    max-width: 640px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    display: none;
    animation: rise 0.35s ease;
  }
  #card.show { display: block; }
  @keyframes rise {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .card-top {
    display: flex; gap: 20px; padding: 24px;
    background: linear-gradient(135deg, var(--panel-2), var(--panel));
    border-bottom: 1px solid var(--border);
  }
  .card-top img {
    width: 120px; height: 120px;
    object-fit: cover; object-position: top;
    border-radius: 14px;
    border: 2px solid var(--accent);
    background: var(--panel-2);
    flex-shrink: 0;
  }
  .avatar-fallback {
    width: 120px; height: 120px;
    border-radius: 14px;
    border: 2px solid var(--border);
    background: var(--panel-2);
    display: flex; align-items: center; justify-content: center;
    font-size: 3rem; flex-shrink: 0;
  }
  .card-title h2 { font-size: 1.5rem; margin-bottom: 6px; }
  .card-title .desc {
    color: var(--accent);
    font-size: 0.9rem; font-weight: 600;
    text-transform: capitalize;
  }
  .card-body { padding: 24px; }
  .card-body p { line-height: 1.65; color: var(--text); font-size: 0.98rem; }
  .card-actions { display: flex; gap: 12px; padding: 0 24px 24px; }
  .btn {
    padding: 10px 18px;
    border-radius: 10px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    border: 1px solid var(--border);
    color: var(--text);
    background: var(--panel-2);
    transition: all 0.15s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { filter: brightness(1.1); color: #fff; }

  #status { margin-top: 28px; color: var(--muted); font-size: 0.95rem; display: none; }
  #status.show { display: block; }
  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid var(--muted); border-top-color: var(--accent);
    border-radius: 50%; margin-right: 8px; vertical-align: -2px;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  footer { margin-top: auto; padding-top: 48px; color: var(--muted); font-size: 0.82rem; text-align: center; }
  footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>

<header>
  <h1><span class="ball">🏀</span> NBA Player Wiki Search</h1>
  <p>Type any NBA player's name — live results from Wikipedia, no API key needed.</p>
</header>

<div class="search-wrap">
  <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
  </svg>
  <input id="search" type="text" placeholder="Try &quot;LeBron&quot;, &quot;Curry&quot;, &quot;Wembanyama&quot;…" autocomplete="off" />
  <div id="suggestions"></div>
</div>

<div class="chips" id="chips">
  <button class="chip random" data-random>🎲 Random legend</button>
</div>

<div id="status"></div>

<div id="card">
  <div class="card-top">
    <div id="card-img-slot"></div>
    <div class="card-title">
      <h2 id="card-name"></h2>
      <div class="desc" id="card-desc"></div>
    </div>
  </div>
  <div class="card-body"><p id="card-extract"></p></div>
  <div class="card-actions">
    <a class="btn primary" id="card-link" href="#" target="_blank" rel="noopener">Read full article ↗</a>
    <button class="btn" id="card-clear">Clear</button>
  </div>
</div>

<footer>
  Built with the free <a href="https://en.wikipedia.org/api/rest_v1/" target="_blank" rel="noopener">Wikipedia REST API</a> · single-file demo, no build step
</footer>

<script>
(() => {
  const QUICK_PICKS = [
    "LeBron James", "Stephen Curry", "Michael Jordan", "Kobe Bryant",
    "Giannis Antetokounmpo", "Nikola Jokić", "Victor Wembanyama", "Luka Dončić",
  ];
  const LEGENDS = [
    "Michael Jordan", "Kareem Abdul-Jabbar", "Magic Johnson", "Larry Bird",
    "Shaquille O'Neal", "Tim Duncan", "Hakeem Olajuwon", "Wilt Chamberlain",
    "Bill Russell", "Kobe Bryant", "Allen Iverson", "Dirk Nowitzki",
    "Kevin Garnett", "Dwyane Wade", "Charles Barkley", "Scottie Pippen",
  ];

  const $search = document.getElementById("search");
  const $sugg = document.getElementById("suggestions");
  const $chips = document.getElementById("chips");
  const $status = document.getElementById("status");
  const $card = document.getElementById("card");

  // Render quick-pick chips
  for (const name of QUICK_PICKS) {
    const b = document.createElement("button");
    b.className = "chip";
    b.textContent = name;
    b.addEventListener("click", () => loadPlayer(name));
    $chips.appendChild(b);
  }
  $chips.querySelector("[data-random]").addEventListener("click", () => {
    loadPlayer(LEGENDS[Math.floor(Math.random() * LEGENDS.length)]);
  });

  // --- Autocomplete (Wikipedia search API, biased toward basketball) ---
  let debounceTimer = null;
  let activeIndex = -1;
  let lastResults = [];

  $search.addEventListener("input", () => {
    clearTimeout(debounceTimer);
    const q = $search.value.trim();
    if (q.length < 2) { closeSuggestions(); return; }
    debounceTimer = setTimeout(() => fetchSuggestions(q), 250);
  });

  $search.addEventListener("keydown", (e) => {
    const items = $sugg.querySelectorAll(".suggestion");
    if (e.key === "ArrowDown") {
      e.preventDefault();
      activeIndex = Math.min(activeIndex + 1, items.length - 1);
      highlight(items);
    } else if (e.key === "ArrowUp") {
      e.preventDefault();
      activeIndex = Math.max(activeIndex - 1, 0);
      highlight(items);
    } else if (e.key === "Enter") {
      e.preventDefault();
      if (activeIndex >= 0 && lastResults[activeIndex]) {
        loadPlayer(lastResults[activeIndex].title);
      } else if (lastResults.length > 0) {
        loadPlayer(lastResults[0].title);
      } else if ($search.value.trim()) {
        loadPlayer($search.value.trim());
      }
    } else if (e.key === "Escape") {
      closeSuggestions();
    }
  });

  document.addEventListener("click", (e) => {
    if (!e.target.closest(".search-wrap")) closeSuggestions();
  });

  function highlight(items) {
    items.forEach((el, i) => el.classList.toggle("active", i === activeIndex));
  }

  async function fetchSuggestions(query) {
    // Bias results toward basketball players by adding context terms
    const url = "https://en.wikipedia.org/w/api.php?" + new URLSearchParams({
      action: "query",
      list: "search",
      srsearch: query + " basketball NBA",
      srlimit: "6",
      format: "json",
      origin: "*",
    });
    try {
      const res = await fetch(url);
      const data = await res.json();
      lastResults = (data.query?.search || []).map(r => ({
        title: r.title,
        snippet: r.snippet.replace(/<[^>]+>/g, ""),
      }));
      renderSuggestions();
    } catch {
      closeSuggestions();
    }
  }

  function renderSuggestions() {
    $sugg.innerHTML = "";
    activeIndex = -1;
    if (lastResults.length === 0) { closeSuggestions(); return; }
    lastResults.forEach((r) => {
      const div = document.createElement("div");
      div.className = "suggestion";
      div.innerHTML = `<span class="s-title"></span><span class="s-desc"></span>`;
      div.querySelector(".s-title").textContent = r.title;
      div.querySelector(".s-desc").textContent = r.snippet.slice(0, 90) + "…";
      div.addEventListener("click", () => loadPlayer(r.title));
      $sugg.appendChild(div);
    });
    $sugg.classList.add("open");
  }

  function closeSuggestions() {
    $sugg.classList.remove("open");
    activeIndex = -1;
  }

  // --- Player card (Wikipedia REST summary API) ---
  async function loadPlayer(title) {
    closeSuggestions();
    $search.value = title;
    $card.classList.remove("show");
    setStatus(`<span class="spinner"></span>Looking up <b>${escapeHtml(title)}</b>…`);
    try {
      const res = await fetch(
        "https://en.wikipedia.org/api/rest_v1/page/summary/" + encodeURIComponent(title)
      );
      if (!res.ok) throw new Error("not found");
      const data = await res.json();
      renderCard(data);
      setStatus("");
    } catch {
      setStatus(`😕 Couldn't find a Wikipedia page for <b>${escapeHtml(title)}</b>. Try another spelling.`);
    }
  }

  function renderCard(data) {
    const imgSlot = document.getElementById("card-img-slot");
    imgSlot.innerHTML = "";
    if (data.thumbnail?.source) {
      const img = document.createElement("img");
      img.src = data.thumbnail.source;
      img.alt = data.title;
      imgSlot.appendChild(img);
    } else {
      const fb = document.createElement("div");
      fb.className = "avatar-fallback";
      fb.textContent = "🏀";
      imgSlot.appendChild(fb);
    }
    document.getElementById("card-name").textContent = data.title;
    document.getElementById("card-desc").textContent = data.description || "";
    document.getElementById("card-extract").textContent = data.extract || "No summary available.";
    document.getElementById("card-link").href =
      data.content_urls?.desktop?.page || "https://en.wikipedia.org/wiki/" + encodeURIComponent(data.title);
    $card.classList.add("show");
    $card.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }

  document.getElementById("card-clear").addEventListener("click", () => {
    $card.classList.remove("show");
    $search.value = "";
    $search.focus();
  });

  function setStatus(html) {
    $status.innerHTML = html;
    $status.classList.toggle("show", !!html);
  }

  function escapeHtml(s) {
    const d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
  }
})();
</script>
</body>
</html>
